[build]
  base = "demo/web"
  publish = "build"
  command = "npm run build"

# Static presentation files
[[redirects]]
  from = "/present/*"
  to = "/present/index.html"
  status = 200

# Copy presentation files to build directory
[[plugins]]
  package = "@netlify/plugin-copy"
  [plugins.inputs]
    from = "present"
    to = "present"

[build.environment]
  NODE_VERSION = "18"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable" 